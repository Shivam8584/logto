name: Build Docker image

# Fork-friendly image build: pushes a complete, self-contained Logto image
# (equivalent to svhd/logto) to this repo's GitHub Container Registry using the
# built-in GITHUB_TOKEN — no Docker Hub account or extra secrets required.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: false
        default: dev
  push:
    branches:
      - feat/step-up-auth-and-test-fixes

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.event.inputs.tag || 'dev' }}
            type=sha,format=short

      - name: Build and push image (amd64)
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          push: true
          load: true
          build-args: |
            dev_features_enabled=false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (boot the image + verify it serves OIDC)
        run: |
          set -euo pipefail
          IMAGE='${{ steps.image.outputs.name }}:${{ github.event.inputs.tag || ''dev'' }}'

          # Backing services the server needs to boot.
          docker network create logto-smoke
          docker run -d --name pg --network logto-smoke \
            -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=p0stgr3s -e POSTGRES_DB=logto \
            postgres:17-alpine
          docker run -d --name redis --network logto-smoke redis:7-alpine
          for i in $(seq 1 20); do docker exec pg pg_isready -U postgres -d logto && break; sleep 2; done

          # Seed the DB using the image's own CLI, then boot the server.
          DB_URL='postgres://postgres:p0stgr3s@pg:5432/logto'
          docker run --rm --network logto-smoke -e DB_URL="$DB_URL" \
            --entrypoint npm "$IMAGE" run cli db seed -- --swe

          docker run -d --name logto --network logto-smoke -p 3001:3001 \
            -e DB_URL="$DB_URL" -e REDIS_URL='redis://redis:6379' \
            -e ENDPOINT='http://localhost:3001' "$IMAGE"

          # Wait for the OIDC discovery document to be served — proves the full bundle runs.
          ok=
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:3001/oidc/.well-known/openid-configuration >/tmp/disco.json 2>/dev/null; then ok=1; break; fi
            sleep 3
          done
          echo "--- server logs ---"; docker logs logto 2>&1 | tail -30
          test -n "$ok"
          echo "--- discovery (proves it runs) ---"; head -c 400 /tmp/disco.json; echo
          echo "SMOKE TEST PASSED ✓"

      - name: Image summary
        run: |
          {
            echo "## ✅ Logto image built & pushed"
            echo ""
            echo "Pull it with:"
            echo '```'
            echo "docker pull ${{ steps.image.outputs.name }}:${{ github.event.inputs.tag || 'dev' }}"
            echo '```'
            echo ""
            echo "Tags:"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
