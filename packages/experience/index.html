<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Sign in</title>
  <script>
    /* See {@link packages/schemas/src/types/ssr.ts} */
    window.logtoSsr = "__LOGTO_SSR__";
  </script>
</head>

<body>
  <script>
    // Keep this blocking script in the HTML so the theme, platform class, and brand color
    // are applied before React loads and the browser has a chance to paint the wrong UI.
    (function () {
      var theme = 'light';
      document.documentElement.setAttribute('data-theme', theme);
      var isMobile = navigator.userAgentData
        ? navigator.userAgentData.mobile
        : /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
          || (/Macintosh/i.test(navigator.userAgent) && navigator.maxTouchPoints > 1);
      document.body.classList.add(isMobile ? 'mobile' : 'desktop');

      try {
        var ssr = window.logtoSsr;
        var darkOk = typeof ssr === 'object' && ssr !== null
          && ssr.signInExperience && ssr.signInExperience.data
          && ssr.signInExperience.data.color.isDarkModeEnabled;
        var prefersDark = typeof window.matchMedia === 'function'
          && window.matchMedia('(prefers-color-scheme: dark)').matches;
        theme = (darkOk && prefersDark) ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        // Brand-neutral system: the accent is a fixed blue (not the tenant's configured
        // primary). Pin it before paint so the tenant's colour never flashes in, and so
        // the primary CTA has its correct accent + contrast on the very first frame.
        var accent = theme === 'dark' ? '#3b82f6' : '#2563eb';
        document.body.style.setProperty('--color-brand-default', accent);
        document.body.style.setProperty('--primary', accent);
        document.body.style.setProperty('--primary-contrast', '#ffffff');
      } catch (e) { /* noop */ }
    })();
  </script>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="app"></div>
  <script type="module" src="src/index.tsx"></script>
</body>

</html>
